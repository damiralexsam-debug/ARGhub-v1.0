  <style>
    .section-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 48px 0 16px 40px;
    }
    .section-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0;
    }
    .section-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .tag-trending    { background: red;    color: white; }
    .tag-new         { background: lime;   color: black; }
    .tag-recommended { background: cyan;   color: black; }
    .tag-browse      { background: orange; color: black; }

    /* ── ARG CARD ── */
    .arg-card {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      transition: 0.3s;
      cursor: pointer;
      position: relative;
    }
    .arg-card:hover {
      border-color: white;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(255,255,255,0.08);
    }
    .arg-img {
      width: 100%;
      object-fit: cover;
      display: block;
      background: #1a1a1a;
    }
    .arg-body { padding: 12px 14px; }
    .arg-name {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 4px;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .arg-meta {
      font-size: 11px;
      color: #666;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .arg-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: bold;
    }
    .badge-active    { background: #0f3d0f; color: lime;      border: 1px solid lime; }
    .badge-concluded { background: #3d0f0f; color: red;       border: 1px solid red; }
    .badge-horror    { background: #2a0a2a; color: violet;    border: 1px solid violet; }
    .badge-puzzle    { background: #0a2a3d; color: cyan;      border: 1px solid cyan; }
    .badge-scifi     { background: #0a1a3d; color: #88aaff;   border: 1px solid #88aaff; }
    .badge-irl       { background: #3d2a0a; color: orange;    border: 1px solid orange; }
    .badge-web       { background: #1a3d1a; color: #aaffaa;   border: 1px solid #aaffaa; }
    .badge-easy      { background: #1a2a1a; color: #88ff88; }
    .badge-medium    { background: #2a2a1a; color: yellow; }
    .badge-hard      { background: #2a1a1a; color: red; }
    .arg-desc-small {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
      margin: 0;
    }

    /* ── TAB 1: TRENDING — auto-scroll ── */
    .trending-strip { overflow: hidden; padding: 10px 0 20px; border-bottom: 1px solid #1a1a1a; }
    .trending-track {
      display: flex;
      gap: 20px;
      width: max-content;
      animation: scrollLeft 60s linear infinite;
      padding: 0 20px;
    }
    .trending-track:hover { animation-play-state: paused; }
    @keyframes scrollLeft {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .trending-track .arg-card { width: 200px; }
    .trending-track .arg-img  { height: 120px; }

    /* ── TAB 2: NEW FOR YOU — horizontal drag ── */
    .hscroll-wrapper {
      overflow-x: auto;
      overflow-y: visible;
      padding: 10px 40px 24px;
      cursor: grab;
      border-bottom: 1px solid #1a1a1a;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .hscroll-wrapper:active { cursor: grabbing; }
    .hscroll-track { display: flex; gap: 20px; width: max-content; }
    .hscroll-track .arg-card { width: 220px; }
    .hscroll-track .arg-img  { height: 130px; }

    /* ── TAB 3: RECOMMENDED — vertical scroll ── */
    .vscroll-wrapper {
      max-height: 520px;
      overflow-y: auto;
      padding: 10px 40px 24px;
      border-bottom: 1px solid #1a1a1a;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .vscroll-wrapper .arg-card {
      display: flex;
      flex-direction: row;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }
    .vscroll-wrapper .arg-img  { width: 160px; height: 100px; flex-shrink: 0; object-fit: cover; }
    .vscroll-wrapper .arg-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
    .vscroll-wrapper .arg-name { font-size: 16px; white-space: normal; }

    /* ── TAB 4: BROWSE ── */
    .browse-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 0 40px 24px;
    }
    #browseSearch {

      border-radius: 8px;
      border: 1px solid white;
      background: #111;
      color: white;

      width: 280px;
      outline: none;

    .browse-filter {
      padding: 11px 18px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #ccc;
      font-family: 'Roboto Slab', serif;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      outline: none;

    .browse-filter:focus,

    .browse-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 0 40px 60px;
      min-height: 200px;
    }

      color: #555;
      text-align: center;
      font-size: 15px;
      margin: 60px auto;
      width: 100%;
      line-height: 1.8;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

</head>

// CARD BUILDER — shared across all tabs
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildCard(arg, showDesc = false) {
  const statusClass = arg.status === "Active" ? "badge-active" : "badge-concluded";
  const genreClass  = arg.genre  === "Horror" ? "badge-horror" : arg.genre === "Puzzle" ? "badge-puzzle" : "badge-scifi";
  const diffClass   = arg.difficulty === "Beginner" ? "badge-easy" : arg.difficulty === "Medium" ? "badge-medium" : "badge-hard";
  const platClass   = arg.platform === "IRL" ? "badge-irl" : arg.platform === "YouTube" ? "badge-horror" : "badge-web";

  const imgEl = arg.img === "placeholder"
    ? `<div class="arg-img" style="background:${arg.color || '#0a0a0a'}; display:flex; align-items:center; justify-content:center; height:120px;">
         <span style="color:#333; font-size:11px; letter-spacing:1px;">[ IMAGE ]</span>
       </div>`
    : `<img class="arg-img" src="images and logos/${arg.img}" alt="${arg.name}">`;

  // Build trailhead links if present (for user-posted ARGs)
  let links = "";
  if (arg.youtube || arg.website || arg.game) {
    links = `<div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;">`;
    if (arg.youtube) links += `<a href="${arg.youtube}" target="_blank" style="font-size:11px; color:red; text-decoration:none; border:1px solid red; padding:2px 8px; border-radius:8px;">▶ YouTube</a>`;
    if (arg.website) links += `<a href="${arg.website}" target="_blank" style="font-size:11px; color:cyan; text-decoration:none; border:1px solid cyan; padding:2px 8px; border-radius:8px;">🌐 Website</a>`;
    if (arg.game)    links += `<a href="${arg.game}"    target="_blank" style="font-size:11px; color:orange; text-decoration:none; border:1px solid orange; padding:2px 8px; border-radius:8px;">🎮 Game</a>`;
    links += `</div>`;
  }

  return `
    <div class="arg-card">
      ${imgEl}
      <div class="arg-body">
        <div class="arg-name">${arg.name}</div>
        ${showDesc ? `<p class="arg-desc-small">${arg.desc}</p>` : ""}
        <div class="arg-meta">
          <span class="arg-badge ${statusClass}">${arg.status}</span>
          <span class="arg-badge ${genreClass}">${arg.genre}</span>
          <span class="arg-badge ${diffClass}">${arg.difficulty}</span>
          <span class="arg-badge ${platClass}">${arg.platform}</span>
        </div>
        ${links}
      </div>
    </div>
  `;
}

// ── TAB 1: TRENDING ──
function buildTrending() {
  const trending = args.filter(a => a.trending);
  const track = document.getElementById("trendingTrack");
  [...trending, ...trending].forEach(a => { track.innerHTML += buildCard(a); });
}

// ── TAB 2: NEW FOR YOU ──
function buildNewForYou() {
  const fresh = args.filter(a => a.newForYou);
  const track = document.getElementById("newForYouTrack");
  fresh.forEach(a => { track.innerHTML += buildCard(a); });

  const wrapper = document.getElementById("newForYouWrapper");
  let isDown = false, startX, scrollLeft;
  wrapper.addEventListener("mousedown", e => { isDown = true; startX = e.pageX - wrapper.offsetLeft; scrollLeft = wrapper.scrollLeft; });
  wrapper.addEventListener("mouseleave", () => isDown = false);
  wrapper.addEventListener("mouseup",    () => isDown = false);
  wrapper.addEventListener("mousemove",  e => {
    if (!isDown) return;
    e.preventDefault();
    wrapper.scrollLeft = scrollLeft - (e.pageX - wrapper.offsetLeft - startX);
  });
}

// ── TAB 3: RECOMMENDED ──
function buildRecommended() {
  const rec = args.filter(a => a.recommended);
  const track = document.getElementById("recommendedTrack");
  rec.forEach(a => { track.innerHTML += buildCard(a, true); });
}

// ── TAB 4: BROWSE — reads only from localStorage ──
function renderBrowse() {
  const query      = document.getElementById("browseSearch").value.toLowerCase();
  const genre      = document.getElementById("filterGenre").value;
  const status     = document.getElementById("filterStatus").value;
  const difficulty = document.getElementById("filterDifficulty").value;
  const platform   = document.getElementById("filterPlatform").value;

  // JSON.parse converts the saved localStorage text back into a JS array
  const postedARGs = JSON.parse(localStorage.getItem("postedARGs") || "[]");

  const filtered = postedARGs.filter(a =>
    a.name.toLowerCase().includes(query) &&
    (genre      === "" || a.genre      === genre)      &&
    (status     === "" || a.status     === status)     &&
    (difficulty === "" || a.difficulty === difficulty) &&
    (platform   === "" || a.platform   === platform)
  );

  const grid = document.getElementById("browseGrid");
  if (postedARGs.length === 0) {
    grid.innerHTML = `<p class="no-results">No ARGs have been posted yet.<br>Go to your <a href="dashboard.html" style="color:lime;">Dashboard</a> and click <strong>+ Post New ARG</strong> to be the first!</p>`;
  } else if (filtered.length === 0) {
    grid.innerHTML = `<p class="no-results">No ARGs match your search or filters.</p>`;
  } else {
    grid.innerHTML = filtered.map(a => buildCard(a, true)).join("");
  }
}

// ── INIT ──
buildTrending();
buildNewForYou();
buildRecommended();
renderBrowse();
</script>
