<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="featured.css">
</head>
<body>

<a href="index.html"><img src="images and logos/ARGhub_3.png" width="200" class="site-logo"></a>
<h2 class="tagline">This is not a game. This is a website.</h2>

<nav class="navbar">
  <a href="discover.html"     class="navbtn discover">Discover</a>
  <a href="pricing.html"      class="navbtn pricing">Pricing</a>
  <a                          class="navbtn featured-active">Featured</a>
  <a href="dashboard.html"    class="navbtn dashboard">Dashboard</a>
  <a href="recting.html"      class="navbtn recting">Recting</a>
  <a href="contextslips.html" class="navbtn context">Context Slips</a>
</nav>

<br>
<h1 style="text-align:center;">Featured ARGs.</h1>

<!-- TAB 1: TRENDING -->
<div class="section-header">
  <h2 class="section-title">Trending</h2>
  <span class="section-tag tag-trending">🔥 HOT</span>
</div>
<div class="trending-strip">
  <div class="trending-track" id="trendingTrack"></div>
</div>

<!-- TAB 2: NEW FOR YOU -->
<div class="section-header">
  <h2 class="section-title">New For You</h2>
  <span class="section-tag tag-new">✦ FRESH</span>
</div>
<div class="hscroll-wrapper" id="newForYouWrapper">
  <div class="hscroll-track" id="newForYouTrack"></div>
</div>

<!-- TAB 3: RECOMMENDED -->
<div class="section-header">
  <h2 class="section-title">Recommended</h2>
  <span class="section-tag tag-recommended">★ FOR YOU</span>
</div>
<div class="vscroll-wrapper" id="recommendedTrack"></div>

<!-- TAB 4: BROWSE -->
<div class="section-header">
  <h2 class="section-title">Browse All</h2>
  <span class="section-tag tag-browse">🔍 SEARCH</span>
</div>
<div class="browse-controls">
  <input id="browseSearch" type="text" placeholder="Search ARGs by name..." oninput="renderBrowse()">
  <select class="browse-filter" id="filterGenre"      onchange="renderBrowse()">
    <option value="">All Genres</option>
    <option value="Horror">Horror</option>
    <option value="Puzzle">Puzzle</option>
    <option value="Sci-Fi">Sci-Fi</option>
  </select>
  <select class="browse-filter" id="filterStatus"     onchange="renderBrowse()">
    <option value="">All Statuses</option>
    <option value="Active">Active</option>
    <option value="Concluded">Concluded</option>
  </select>
  <select class="browse-filter" id="filterDifficulty" onchange="renderBrowse()">
    <option value="">All Difficulties</option>
    <option value="Beginner">Beginner</option>
    <option value="Medium">Medium</option>
    <option value="Hard">Hard</option>
  </select>
  <select class="browse-filter" id="filterPlatform"   onchange="renderBrowse()">
    <option value="">All Platforms</option>
    <option value="YouTube">YouTube</option>
    <option value="Web">Web</option>
    <option value="IRL">IRL</option>
  </select>
</div>
<div class="browse-grid" id="browseGrid"></div>

<!-- ARG DETAIL POPUP -->
<div class="detail-overlay" id="detailOverlay" onclick="handleDetailOverlay(event)">
  <div class="detail-box" id="detailBox">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<script src="featured.js"></script>
<script type="module" src="supabase-auth.js"></script>
</body>
</html>
