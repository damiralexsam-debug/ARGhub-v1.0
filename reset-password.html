<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — ARGhub</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background:#000; color:white; font-family:'Roboto Slab',serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .reset-box {
      background:#111; border:1px solid #2a2a2a; border-radius:16px;
      padding:40px 44px; width:420px;
      animation:fadeUp 0.3s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    h2 { font-size:22px; font-weight:900; margin:0 0 8px; }
    p  { font-size:13px; color:#666; margin:0 0 24px; }
    .field { display:flex; flex-direction:column; gap:5px; margin-bottom:16px; }
    .field label { font-size:11px; color:#888; letter-spacing:1px; }
    .field input {
      padding:11px 14px; border-radius:8px; border:1px solid #2a2a2a;
      background:#1a1a1a; color:white; font-family:'Roboto Slab',serif;
      font-size:14px; outline:none; transition:0.2s;
    }
    .field input:focus { border-color:#555; }
    .submit-btn {
      width:100%; padding:13px; border-radius:10px;
      border:1px solid white; background:transparent; color:white;
      font-family:'Roboto Slab',serif; font-size:15px;
      cursor:pointer; transition:0.3s; margin-top:4px;
    }
    .submit-btn:hover { background:white; color:black; }
    .submit-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .msg { font-size:13px; margin-top:14px; text-align:center; display:none; }
    .msg.ok  { color:#39d353; }
    .msg.err { color:#e74c3c; }
    .home-link { color:#555; font-size:12px; text-align:center; margin-top:20px; text-decoration:none; display:block; }
    .home-link:hover { color:#aaa; }
  </style>
</head>
<body>
  <div class="reset-box">
    <h2>Set New Password</h2>
    <p>Choose a new password for your ARGhub account.</p>
    <div class="field">
      <label>New Password</label>
      <input type="password" id="newPw" placeholder="At least 6 characters">
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confirmPw" placeholder="Same as above">
    </div>
    <button class="submit-btn" id="submitBtn" onclick="resetPassword()">Update Password →</button>
    <div class="msg" id="msg"></div>
    <a href="index.html" class="home-link">← Back to ARGhub</a>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    const supabase = createClient(
      "https://wlwvwsouoioojvemldwx.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indsd3Z3c291b2lvb2p2ZW1sZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Njg2OTMsImV4cCI6MjA4ODI0NDY5M30.IE7kN9CWsdsalbc5kixfGXNU9ksEorRlYsXmkHr8vrk"
    );

    window.resetPassword = async function() {
      const pw  = document.getElementById("newPw").value;
      const pw2 = document.getElementById("confirmPw").value;
      const msg = document.getElementById("msg");
      const btn = document.getElementById("submitBtn");
      msg.style.display = "none";

      if (!pw || pw.length < 6) {
        msg.textContent = "Password must be at least 6 characters.";
        msg.className = "msg err"; msg.style.display = "block"; return;
      }
      if (pw !== pw2) {
        msg.textContent = "Passwords do not match.";
        msg.className = "msg err"; msg.style.display = "block"; return;
      }

      btn.disabled = true; btn.textContent = "Updating...";
      const { error } = await supabase.auth.updateUser({ password: pw });
      if (error) {
        msg.textContent = `❌ ${error.message}`;
        msg.className = "msg err"; msg.style.display = "block";
        btn.disabled = false; btn.textContent = "Update Password →";
      } else {
        msg.textContent = "✓ Password updated! Redirecting to ARGhub...";
        msg.className = "msg ok"; msg.style.display = "block";
        setTimeout(() => { window.location.href = "index.html"; }, 2000);
      }
    };
  </script>
</body>
</html>
